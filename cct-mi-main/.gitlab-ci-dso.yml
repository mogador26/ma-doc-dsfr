include:
- project: $CATALOG_PATH
  file: vault-ci.yml
  ref: main
- project: $CATALOG_PATH
  file: kaniko-ci.yml
  ref: main

default:
  image: alpine:latest

cache:
  paths:
  - node_modules

variables:
  REGISTRY_URL: "${REGISTRY_HOST}/${PROJECT_PATH}"

stages:
- read-secret
- docker-build

read_secret:
  stage: read-secret
  extends:
  - .vault:read_secret

docker-build:
  variables:
    TAG: "${CI_COMMIT_REF_SLUG}"
    WORKING_DIR: ./
    DOCKERFILE: ./Dockerfile
    IMAGE_NAMES: cct-mi:${CI_COMMIT_SHORT_SHA} cct-mi:${CI_COMMIT_REF_NAME}
    EXTRA_BUILD_ARGS: --registry-mirror registry.dso.interieur.rie.gouv.fr/dockerhub --build-arg VERSION=${CI_COMMIT_REF_NAME}
  stage: docker-build
  extends:
  - .kaniko:build-push

